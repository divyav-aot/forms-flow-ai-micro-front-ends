name: forms-flow-rsbcservice-CD-to-registry
on:
  workflow_dispatch:
  push:
    branches:
      # - rsbc/7.0.0
      # - feature/remove-s3-dependency
      - '**'      
    # paths:
    #   - "forms-flow-rsbcservice/**"
    #   - "VERSION"
defaults:
  run:
    shell: bash
    working-directory: ./forms-flow-rsbcservice
jobs:
  build:
    name: build-and-push-image-to-dockerhub
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        include:
          - image: formsflow/forms-flow-rsbcservice
            context: forms-flow-rsbcservice
            dockerfile: Dockerfile
            name: forms-flow-rsbcservice
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2
        with:
          install: true

      - name: Set version
        run: |
          VER=$(cat VERSION)
          echo "VERSION=$VER" >> $GITHUB_ENV

      - run: echo "Building version ${{ env.VERSION }}"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ matrix.image }}
          tags: ${{ env.VERSION }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Cache Docker layers
        uses: actions/cache@v2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.name }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
